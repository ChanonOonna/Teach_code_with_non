services:
  db:
    image: mysql:8.0
    container_name: teachcode_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-teachcode}
      MYSQL_USER: ${MYSQL_USER:-teachcode_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-teachcode_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
      interval: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teachcode_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mysql://${MYSQL_USER:-teachcode_user}:${MYSQL_PASSWORD:-teachcode_pass}@db:3306/${MYSQL_DATABASE:-teachcode}"
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-supersecretrefreshjwtkey_change_in_production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-supersecretoauthhashingkey}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "node_modules/.bin/prisma db push --skip-generate && node server.js"

  # Optional: phpMyAdmin for DB management
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: teachcode_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER:-teachcode_user}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-teachcode_pass}
    depends_on:
      - db
    profiles:
      - debug

volumes:
  mysql_data:
    driver: local
